[tool.poetry]
name = "anespy"
version = "0.1.3.7"
description = "A package for using ANES data in Python"
authors = ["Jackson Rudoff"]
license = "MIT"
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.9"
pandas = "^1.5.2"
numpy = "^1.23.5"
